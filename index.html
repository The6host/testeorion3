<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORION</title>
    <script>
      // Restaura rota após redirect do 404.html (GitHub Pages SPA)
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Trata query string gerada pelo 404.html
        var l = window.location;
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').reduce(function(o, s) {
            var eq = s.indexOf('=');
            o[decodeURIComponent(s.slice(0, eq))] = decodeURIComponent(s.slice(eq + 1).replace(/~and~/g, '&'));
            return o;
          }, {});
          if (decoded.p !== undefined) {
            history.replaceState(null, null,
              l.pathname.split('/').slice(0, 2).join('/') + decoded.p +
              (decoded.q ? '?' + decoded.q : '') + l.hash
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
